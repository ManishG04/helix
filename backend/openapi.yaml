      responses:
        "204":
          description: Team deleted successfully
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /teams/{team_id}/members:
    get:
      tags:
        - Teams
      summary: List team members
      description: Get all members of a team
      operationId: listTeamMembers
      parameters:
        - $ref: "#/components/parameters/TeamIdParam"
      responses:
        "200":
          description: Team members retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    post:
      tags:
        - Teams
      summary: Add team member
      description: Add a member to the team. Team leader only.
      operationId: addTeamMember
      parameters:
        - $ref: "#/components/parameters/TeamIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberAdd"
      responses:
        "201":
          description: Member added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: User already in a team or team is full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams/{team_id}/members/{user_id}:
    delete:
      tags:
        - Teams
      summary: Remove team member
      description: Remove a member from the team. Team leader or self-removal only.
      operationId: removeTeamMember
      parameters:
        - $ref: "#/components/parameters/TeamIdParam"
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "204":
          description: Member removed successfully
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /teams/{team_id}/transfer-leadership:
    post:
      tags:
        - Teams
      summary: Transfer team leadership
      description: Transfer team leadership to another member. Current leader only.
      operationId: transferLeadership
      parameters:
        - $ref: "#/components/parameters/TeamIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_leader_id
              properties:
                new_leader_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Leadership transferred successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWithMembers"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /teams/join:
    post:
      tags:
        - Teams
      summary: Join team using code
      description: Join a team using the unique join code
      operationId: joinTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTeamRequest"
      responses:
        "200":
          description: Joined team successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWithMembers"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Invalid join code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already in a team or team is full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams/{team_id}/regenerate-code:
    post:
      tags:
        - Teams
      summary: Regenerate join code
      description: Generate a new join code for the team. Team leader only.
      operationId: regenerateJoinCode
      parameters:
        - $ref: "#/components/parameters/TeamIdParam"
      responses:
        "200":
          description: Join code regenerated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  join_code:
                    type: string
                    example: "NEWALPHA2026"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ==================== FACULTY AVAILABILITY ====================
  /faculty/availability:
    get:
      tags:
        - Faculty Availability
      summary: Get current user's availability
      description: Get the authenticated faculty member's availability slots
      operationId: getMyAvailability
      parameters:
        - name: status
          in: query
          description: Filter by slot status
          schema:
            $ref: "#/components/schemas/AvailabilityStatus"
        - name: day_of_week
          in: query
          description: Filter by day of week
          schema:
            $ref: "#/components/schemas/DayOfWeek"
      responses:
        "200":
          description: Availability slots retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Not a faculty member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Faculty Availability
      summary: Add availability slot
      description: Manually add a new availability slot. Faculty only.
      operationId: addAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacultyAvailabilityCreate"
      responses:
        "201":
          description: Availability slot added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          description: Overlapping slot exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /faculty/{user_id}/availability:
    get:
      tags:
        - Faculty Availability
      summary: Get faculty member's availability
      description: Get a specific faculty member's active availability slots (for students to book appointments)
      operationId: getFacultyAvailability
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - name: day_of_week
          in: query
          description: Filter by day of week
          schema:
            $ref: "#/components/schemas/DayOfWeek"
      responses:
        "200":
          description: Availability slots retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /faculty/availability/{availability_id}:
    get:
      tags:
        - Faculty Availability
      summary: Get availability slot details
      description: Get details of a specific availability slot
      operationId: getAvailabilitySlot
      parameters:
        - $ref: "#/components/parameters/AvailabilityIdParam"
      responses:
        "200":
          description: Availability slot retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags:
        - Faculty Availability
      summary: Update availability slot
      description: Update an existing availability slot. Faculty owner only.
      operationId: updateAvailability
      parameters:
        - $ref: "#/components/parameters/AvailabilityIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacultyAvailabilityUpdate"
      responses:
        "200":
          description: Availability slot updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Overlapping slot exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Faculty Availability
      summary: Delete availability slot
      description: Delete an availability slot. Faculty owner only. Cannot delete if appointments are scheduled.
      operationId: deleteAvailability
      parameters:
        - $ref: "#/components/parameters/AvailabilityIdParam"
      responses:
        "204":
          description: Availability slot deleted successfully
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Cannot delete - appointments exist for this slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faculty/availability/bulk:
    post:
      tags:
        - Faculty Availability
      summary: Bulk add availability slots
      description: Add multiple availability slots at once. Faculty only.
      operationId: bulkAddAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - slots
              properties:
                slots:
                  type: array
                  items:
                    $ref: "#/components/schemas/FacultyAvailabilityCreate"
      responses:
        "201":
          description: Availability slots added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                    description: Number of slots created
                  skipped:
                    type: integer
                    description: Number of slots skipped due to conflicts
                  slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    delete:
      tags:
        - Faculty Availability
      summary: Bulk delete availability slots
      description: Delete multiple availability slots. Faculty only.
      operationId: bulkDeleteAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - slot_ids
              properties:
                slot_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Availability slots deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
                    description: Slots skipped due to existing appointments
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  # ==================== TIMETABLE OCR ====================
  /faculty/timetable/upload:
    post:
      tags:
        - Timetable OCR
      summary: Upload timetable for OCR processing
      description: |
        Upload a timetable image for OCR processing to automatically extract availability slots.
        The image is processed asynchronously via AWS Lambda and SQS.
        Supported formats: PNG, JPG, JPEG, PDF (first page only)
      operationId: uploadTimetable
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Timetable image file (PNG, JPG, JPEG, or PDF)
      responses:
        "202":
          description: Timetable uploaded and queued for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimetableUploadResponse"
        "400":
          description: Invalid file format or file too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /faculty/timetable/ocr-status/{job_id}:
    get:
      tags:
        - Timetable OCR
      summary: Get OCR processing status
      description: Check the status of a timetable OCR processing job
      operationId: getOCRStatus
      parameters:
        - name: job_id
          in: path
          required: true
          description: OCR Job UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OCR job status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OCRJobStatus"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /faculty/timetable/ocr-results/{job_id}:
    get:
      tags:
        - Timetable OCR
      summary: Get OCR extracted slots for review
      description: Get the availability slots extracted by OCR for review before confirmation
      operationId: getOCRResults
      parameters:
        - name: job_id
          in: path
          required: true
          description: OCR Job UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OCR results retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  extracted_slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FacultyAvailabilityCreate"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: OCR processing not yet complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faculty/timetable/ocr-confirm/{job_id}:
    post:
      tags:
        - Timetable OCR
      summary: Confirm OCR extracted slots
      description: Confirm and save the OCR extracted availability slots (optionally with modifications)
      operationId: confirmOCRResults
      parameters:
        - name: job_id
          in: path
          required: true
          description: OCR Job UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - confirmed_slots
              properties:
                confirmed_slots:
                  type: array
                  items:
                    $ref: "#/components/schemas/FacultyAvailabilityCreate"
                  description: List of slots to save (can be modified from OCR results)
      responses:
        "201":
          description: Availability slots confirmed and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                  slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FacultyAvailability"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ==================== APPOINTMENTS ====================
  /appointments:
    get:
      tags:
        - Appointments
      summary: List appointments
      description: |
        Get a list of appointments.
        - Students see their own appointments
        - Faculty see appointments where they are the faculty
        - Admins see all appointments
      operationId: listAppointments
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            $ref: "#/components/schemas/AppointmentStatus"
        - name: date_from
          in: query
          description: Filter appointments from this date
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter appointments until this date
          schema:
            type: string
            format: date
        - name: faculty_id
          in: query
          description: Filter by faculty ID
          schema:
            type: string
            format: uuid
        - name: team_id
          in: query
          description: Filter by team ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Appointments retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppointmentWithDetails"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags:
        - Appointments
      summary: Book an appointment
      description: Book a new appointment with a faculty member
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreate"
      responses:
        "201":
          description: Appointment booked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Faculty or slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Time slot not available or conflicts with existing appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /appointments/{appointment_id}:
    get:
      tags:
        - Appointments
      summary: Get appointment details
      description: Retrieve detailed information about a specific appointment
      operationId: getAppointment
      parameters:
        - $ref: "#/components/parameters/AppointmentIdParam"
      responses:
        "200":
          description: Appointment retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentWithDetails"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags:
        - Appointments
      summary: Update appointment
      description: Update appointment details. Students can update purpose, Faculty can update status.
      operationId: updateAppointment
      parameters:
        - $ref: "#/components/parameters/AppointmentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Appointment updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags:
        - Appointments
      summary: Cancel appointment
      description: Cancel a pending appointment. Only the student who booked or admin can cancel.
      operationId: cancelAppointment
      parameters:
        - $ref: "#/components/parameters/AppointmentIdParam"
      responses:
        "204":
          description: Appointment cancelled successfully
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Cannot cancel - appointment already accepted or past
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{appointment_id}/accept:
    post:
      tags:
        - Appointments
      summary: Accept appointment
      description: Accept a pending appointment request. Faculty only.
      operationId: acceptAppointment
      parameters:
        - $ref: "#/components/parameters/AppointmentIdParam"
      responses:
        "200":
          description: Appointment accepted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Appointment already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{appointment_id}/reject:
    post:
      tags:
        - Appointments
      summary: Reject appointment
      description: Reject a pending appointment request. Faculty only.
      operationId: rejectAppointment
      parameters:
        - $ref: "#/components/parameters/AppointmentIdParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for rejection
      responses:
        "200":
          description: Appointment rejected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Appointment already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/available-slots:
    get:
      tags:
        - Appointments
      summary: Get available appointment slots
      description: Get available time slots for a faculty member on a specific date
      operationId: getAvailableSlots
      parameters:
        - name: faculty_id
          in: query
          required: true
          description: Faculty member's user ID
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          description: Date to check availability
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Available slots retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    slot_id:
                      type: string
                      format: uuid
                    start_time:
                      type: string
                      format: time
                    end_time:
                      type: string
                      format: time
                    is_available:
                      type: boolean
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Faculty not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== ADMIN ENDPOINTS ====================
  /admin/users:
    get:
      tags:
        - Users
      summary: Admin - List all users
      description: Admin only - Get all users with advanced filtering
      operationId: adminListUsers
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/UserRole"
        - name: created_after
          in: query
          schema:
            type: string
            format: date
        - name: created_before
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /admin/stats:
    get:
      tags:
        - Users
      summary: Admin - Get system statistics
      description: Admin only - Get overall system statistics
      operationId: getSystemStats
      responses:
        "200":
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:
                    type: integer
                  users_by_role:
                    type: object
                    properties:
                      STUDENT:
                        type: integer
                      FACULTY:
                        type: integer
                      ADMIN:
                        type: integer
                  total_projects:
                    type: integer
                  projects_by_status:
                    type: object
                    properties:
                      PROPOSED:
                        type: integer
                      APPROVED:
                        type: integer
                      COMPLETED:
                        type: integer
                  total_teams:
                    type: integer
                  total_appointments:
                    type: integer
                  appointments_by_status:
                    type: object
                    properties:
                      PENDING:
                        type: integer
                      ACCEPTED:
                        type: integer
                      REJECTED:
                        type: integer
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  # ==================== HEALTH CHECK ====================
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API is running
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  version:
                    type: string
                    example: "1.0.0"
                  timestamp:
                    type: string
                    format: date-time
