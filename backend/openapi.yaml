                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags:
        - Teams
      summary: Create a new team
      description: Create a new team for a project. Creator becomes team leader.
